<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ekisquad Worldwide</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Background Effect */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 1) 0%, rgba(5, 5, 5, 1) 100%),
                radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.03) 0%, transparent 40%);
            z-index: -2;
        }

        /* Aesthetic Snow & Particle Canvases */
        #snow-canvas, #trail-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        #snow-canvas {
            opacity: 0.6;
        }

        /* Intro Overlay */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
        }

        #intro-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        @keyframes logo-pulse {
            0%, 100% { 
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.05));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.15));
                transform: scale(1.02);
            }
        }

        .logo-center {
            width: 180px;
            margin-bottom: 30px;
            animation: logo-pulse 4s ease-in-out infinite;
            transition: transform 0.5s ease;
        }

        .intro-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #fff;
            margin-bottom: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .enter-btn {
            font-family: 'JetBrains Mono', monospace;
            padding: 14px 40px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.85rem;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Main Layout */
        .main-content {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease 0.5s;
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        body.site-active .main-content {
            opacity: 1;
            transform: translateY(0);
        }

        .motto {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: #444;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 60px;
            text-align: center;
            background: linear-gradient(180deg, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Lanyard Grid */
        .lanyard-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 32px;
            width: 100%;
        }

        .lanyard-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 320px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .lanyard-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .profile-banner {
            width: 100%;
            height: 100px;
            background: #1a1a1a;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .avatar-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin-top: -45px;
            z-index: 2;
        }

        .pfp {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #111;
            border: 6px solid #0a0a0a;
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 4px solid #0a0a0a;
        }

        .online { background: #23a55a; box-shadow: 0 0 10px rgba(35, 165, 90, 0.5); }
        .idle { background: #f0b232; }
        .dnd { background: #f23f43; }
        .offline { background: #80848e; }

        .details {
            padding: 16px 24px 24px;
            width: 100%;
        }

        .details h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; color: #fff; }
        .details p { font-size: 0.75rem; color: #666; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }

        .spotify-indicator {
            margin-top: 16px;
            padding: 10px 14px;
            background: rgba(29, 185, 84, 0.08);
            border: 1px solid rgba(29, 185, 84, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            color: #1DB954;
            transition: all 0.3s ease;
            width: 100%;
            text-align: left;
        }

        .spotify-indicator .song-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            line-height: 1.2;
        }

        .spotify-indicator .artist-name {
            font-size: 0.65rem;
            color: #1DB954;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Music Player Widget */
        .music-widget {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 50;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 320px;
        }

        .music-widget:hover {
            border-color: rgba(255,255,255,0.15);
            background: rgba(15, 15, 15, 0.75);
            transform: translateX(-50%) translateY(-2px);
        }

        .artwork-container {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .artwork-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .music-widget:hover .artwork-container img {
            transform: scale(1.1);
        }

        .play-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .play-toggle:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }

        .play-toggle:active { transform: scale(0.95); }

        .track-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-width: 100px;
        }

        .track-name { 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: #fff; 
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .track-status { 
            font-size: 0.65rem; 
            color: #888; 
            text-transform: uppercase; 
            font-family: 'JetBrains Mono', monospace; 
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 8px;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        input[type=range] {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        @media (max-width: 640px) {
            .lanyard-card { width: 90%; }
            .music-widget { width: 92%; min-width: unset; padding: 10px 14px; gap: 12px; }
            .volume-control { display: none; }
        }
    </style>
</head>
<body class="">

<!-- INTRO OVERLAY -->

</audio>
<script>
    // SNOW EFFECT SCRIPT
    const snowCanvas = document.getElementById('snow-canvas');
    const snowCtx = snowCanvas.getContext('2d');
    let sWidth, sHeight, snowflakes;

    function initSnow() {
        sWidth = window.innerWidth;
        sHeight = window.innerHeight;
        snowCanvas.width = sWidth;
        snowCanvas.height = sHeight;
        snowflakes = [];

        for (let i = 0; i < 150; i++) {
            snowflakes.push({
                x: Math.random() * sWidth,
                y: Math.random() * sHeight,
                radius: Math.random() * 2 + 1,
                opacity: Math.random() * 0.5 + 0.1,
                speed: Math.random() * 0.5 + 0.2,
                blur: Math.random() * 2
            });
        }
    }

    function drawSnow() {
        snowCtx.clearRect(0, 0, sWidth, sHeight);
        snowflakes.forEach(flake => {
            snowCtx.beginPath();
            snowCtx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
            snowCtx.fillStyle = `rgba(220, 220, 220, ${flake.opacity})`;
            snowCtx.shadowBlur = flake.blur;
            snowCtx.shadowColor = "white";
            snowCtx.fill();

            flake.y += flake.speed;
            if (flake.y > sHeight) {
                flake.y = -5;
                flake.x = Math.random() * sWidth;
            }
        });
        requestAnimationFrame(drawSnow);
    }

    // MOUSE TRAIL PARTICLE SCRIPT
    const trailCanvas = document.getElementById('trail-canvas');
    const trailCtx = trailCanvas.getContext('2d');
    let particles = [];

    function initTrailCanvas() {
        trailCanvas.width = window.innerWidth;
        trailCanvas.height = window.innerHeight;
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 1.5;
            this.speedY = (Math.random() - 0.5) * 1.5;
            this.life = 1.0; 
            this.decay = Math.random() * 0.02 + 0.015;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }

        draw() {
            trailCtx.beginPath();
            trailCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            trailCtx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
            trailCtx.shadowBlur = 4;
            trailCtx.shadowColor = "rgba(255, 255, 255, 0.5)";
            trailCtx.fill();
        }
    }

    function handleParticles() {
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
    }

    function animateTrail() {
        trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
        handleParticles();
        requestAnimationFrame(animateTrail);
    }

    window.addEventListener('mousemove', (e) => {
        for(let i = 0; i < 2; i++) {
            particles.push(new Particle(e.clientX, e.clientY));
        }
    });

    window.addEventListener('resize', () => {
        initSnow();
        initTrailCanvas();
    });

    initSnow();
    drawSnow();
    initTrailCanvas();
    animateTrail();

    // LANYARD PRESENCE LOGIC
    const USER_IDS = ["1341768058644987945", "1213158954197327932", "733933125758877697"];
    const audio = document.getElementById('bgAudio');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const volumeSlider = document.getElementById('volumeSlider');
    const playerStatus = document.getElementById('playerStatus');

    function enterSite() {
        document.getElementById('intro-overlay').classList.add('hidden');
        document.body.classList.add('site-active');
        
        audio.play().then(() => {
            playIcon.innerText = "pause";
            playerStatus.innerText = "Now Playing";
        }).catch(() => {
            console.log("Autoplay blocked by browser");
        });
    }

    playBtn.addEventListener('click', function() {
        if (audio.paused) {
            audio.play();
            playIcon.innerText = "pause";
            playerStatus.innerText = "Now Playing";
        } else {
            audio.pause();
            playIcon.innerText = "play_arrow";
            playerStatus.innerText = "Paused";
        }
    });

    volumeSlider.addEventListener('input', function() {
        audio.volume = volumeSlider.value;
    });

    function createCardHTML(id) {
        const isFirst = (id === USER_IDS[0]);
        const isSecond = (id === USER_IDS[1]);
        const isThird = (id === USER_IDS[2]);
        
        let bannerStyle = '';
        if (isFirst) {
            bannerStyle = 'style="background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBSQaXVnr-rA27e1CecTVsS3AVXR18aLJDUIOYb3CSvprJx1Gox_I93QPvUdVOD1qdBVHDXZnsvvJBZcxFgE3k6_wmBBWYUqEatLr28zftf9rCwGnF5yGBmp-dLrBNiOcqMyFE-d81utBBkHhj1SqGaoseoRJTEG-zUS3oDBLsKeqW9opsQofjMQN9CCLfPwAVi7a2ryUj-7QnAs1XDFCAgIvCmO5clWYG3qXdfAPOnqoGgxVjZzMQ1RfQ9gonM5aOM3B_YTBz1NszI);"';
        } else if (isSecond) {
            bannerStyle = 'style="background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAVrGCFYAUdFtVzrfua2pmIpjAXfxe_YIHxxxXEfDeMd_MOO3Y5K3FuTgH_WwsWBOkKqubafDbOwWHVGNvF5mnz8PXm5NtHap5hAWq5d2NvNFVLcZVTEzgKAKaAVK0aUbYDWszbs5-hV5DI8-m1N4_bEQuyxSSoa7gtNGpYWmbGv9abxwX_mlrcn9_v10Qn3xbpCPxfb6Ly-YqH6PnL8KyHS8hSzfBXfSYoLw2eo8C6LEWLBN0cs3NEpKo96P7y6Ey4QkRko4quEj4Y); scale: 1.2; background-position: center;"';
        } else if (isThird) {
            bannerStyle = 'style="background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuA2ZIa-NC8Q2XkpuhFLy2GwfFMi5X9uERCcq8f8tj2jcJEn_wJ9fCr5ag8fzlrMfA-k5IXd9c1WkBqdpxCfm35o3018eldNw9_KL_XI1sEvmfX7q8jlGa5rga29GGa3FYteoi5HeGLbouAIdkbpgTphRYEziU2gEXxfvKea1CQSW_1Fe1iv53WfHBKvboC28trsgcd4tUD2WWvOWRHMYueTYReAjuchBrzFOXP5kdxAoSLWvkmj2IgGGOXxcYixu3G4huxNstZuB6rJ);"';
        }

        const quoteHtml = isFirst ? '<p style="font-size: 0.65rem; color: #888; font-style: italic; margin-top: 2px;">wala lang trip lang</p>' : 
                        (isSecond ? '<p style="font-size: 0.65rem; color: #888; font-style: italic; margin-top: 2px;">♰ IN ZOJU WE TRUST ♰</p>' : '');
        
        return `
        <div class="lanyard-card" id="card-${id}">
            <div class="profile-banner overflow-hidden" id="banner-${id}" ${bannerStyle}></div>
            <div class="avatar-container">
                <img alt="User" class="pfp" id="pfp-${id}" src="https://cdn.discordapp.com/embed/avatars/0.png">
                <div class="status-dot offline" id="dot-${id}"></div>
            </div>
            <div class="details">
                <h2 id="name-${id}">Loading...</h2>
                <p id="status-text-${id}">OFFLINE</p>
                ${quoteHtml}
                <div class="spotify-indicator" id="spotify-container-${id}" style="display: none;">
                    <!-- Content dynamic via JS -->
                </div>
            </div>
        </div>`;
    }

    const cardContainer = document.getElementById('card-container');
    USER_IDS.forEach(id => {
        cardContainer.innerHTML += createCardHTML(id);
    });

    async function getPresence() {
        for (const id of USER_IDS) {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${id}`);
                const { data } = await res.json();

                const pfp = document.getElementById(`pfp-${id}`);
                
                if (data.discord_user.avatar) {
                    pfp.src = `https://cdn.discordapp.com/avatars/${id}/${data.discord_user.avatar}.png?size=256`;
                }
                
                document.getElementById(`name-${id}`).innerText = data.discord_user.display_name || data.discord_user.username;
                document.getElementById(`dot-${id}`).className = `status-dot ${data.discord_status}`;
                
                const statusP = document.getElementById(`status-text-${id}`);
                const spotifyDiv = document.getElementById(`spotify-container-${id}`);

                if (data.listening_to_spotify) {
                    spotifyDiv.style.display = 'flex';
                    spotifyDiv.innerHTML = `
                        <img src="${data.spotify.album_art_url}" class="w-10 h-10 rounded-lg shadow-lg border border-white/10 flex-shrink-0">
                        <div class="flex flex-col text-left overflow-hidden">
                            <span class="song-title">${data.spotify.song}</span>
                            <span class="artist-name">${data.spotify.artist}</span>
                        </div>
                    `;
                    statusP.innerText = "LISTENING TO SPOTIFY";
                } else {
                    spotifyDiv.style.display = 'none';
                    statusP.innerText = data.discord_status.toUpperCase();
                }

            } catch (err) {
                console.error("Lanyard error for ID " + id + ":", err);
                const statusP = document.getElementById(`status-text-${id}`);
                if (statusP) statusP.innerText = "CONNECTION FAILED";
            }
        }
    }

    getPresence();
    setInterval(getPresence, 15000);
</script>
